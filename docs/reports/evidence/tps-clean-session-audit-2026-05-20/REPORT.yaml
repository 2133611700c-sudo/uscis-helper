bugs:
  - id: "#160"
    severity: P0
    title: i94 class_of_admission did not alias to status_at_last_entry
    evidence:
      - state.uploadsMeta.i94.fields.i94_class_of_admission.value = "UHP"
      - review screen UI text "Статус при въезде: Не найдено — введите вручную"
      - baseline I-821 Part2_Item19_ImmigrationStatus[0] = empty
      - baseline I-765 Line23_StatusLastEntry[0] = empty
    root_cause: >
      TPSWizardV2.tsx:1823 reads v('status_at_last_entry') directly from
      mergedFields. The OCR i94 module emits the field as i94_class_of_admission
      (matching CBP wording on the printed I-94). No alias bridged the two.
      Legacy GeneratePacketBlock.tsx:82 had this alias; regression on V2 port.
    fix:
      - file: apps/web/src/lib/tps/wizardAliases.ts (new, 41 LOC)
        change: Pure helper applyI94StatusAlias() — bridges the alias,
                never overwrites existing values, sets requires_review=true.
      - file: apps/web/src/lib/tps/__tests__/wizardAliases.test.ts (new, 73 LOC)
        change: 6 unit-test cases covering alias, no-overwrite, no-op,
                no-mutation, idempotency.
      - file: apps/web/src/app/[locale]/services/tps-ukraine/start/TPSWizardV2.tsx
        change: Import applyI94StatusAlias. Replace 2 lines in mergedFields
                useMemo to apply alias before returning. Net +7 / -3 lines.
    verification:
      typecheck: PASS (npx tsc --noEmit, zero errors)
      unit_tests_pure_logic: PASS (6/6 cases via direct node run)
      vitest_full_run: NOT RUN (rolldown native binding missing on sandbox arm64)
      pdf_after_simulation: >
        Sent answers with status_at_last_entry=UHP via curl to prod
        /api/tps/generate-packet. Resulting I-821 Part2_Item19_ImmigrationStatus
        and I-765 Line23_StatusLastEntry both = "UHP". Confirms downstream
        pipeline accepts the aliased value — the fix will produce correct PDFs
        once deployed.
      browser_after_deploy: PENDING — must run clean-session test on the new SHA.

  - id: "#161"
    severity: P2
    title: passport_expiration_date OCR'd but not shown on Step 5 review
    evidence:
      - state.passport_expiration_date = 2029-02-22 (source=ocr_mrz)
      - Step 5 review screen DOM does NOT mention "2029-02-22" or "Срок паспорта"
      - PDF Part2_Item24_PassportExpiration = 02/22/2029 (correct)
    root_cause: TPSWizardV2 review row list omits the field.
    fix: NOT FIXED — out of minimal scope. Data does ship into PDF correctly.
    verification: deferred

  - id: "#162"
    severity: P2
    title: i94_admit_until OCR'd but not shown on Step 5 review
    evidence:
      - state.i94_admit_until = 2026-09-07 (source=ocr_keyword)
      - review screen DOM does NOT show admit_until value
      - I-821 form 01/20/25 has no AcroForm field for admit-until either
    root_cause: Review row list omits the field; PDF mapping not needed.
    fix: NOT FIXED — out of minimal scope. Not in PDF anyway.
    verification: deferred

