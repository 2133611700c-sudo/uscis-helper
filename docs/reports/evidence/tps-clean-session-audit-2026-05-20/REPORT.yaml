risks_and_control:
  - risk: Fix is uncommitted/un-deployed at time of report — production users
          still see the bug.
    control: Owner must run `pnpm --filter web typecheck && pnpm --filter web build
             && pnpm --filter web test` on Mac, commit, push, wait for Vercel,
             then repeat clean-session test on the new SHA.
  - risk: Alias forces requires_review=true on status_at_last_entry. If users
          frequently dismiss the badge without confirming, the wrong value
          could ship to USCIS. Class codes like UHP may need expansion to
          "Parole (Uniting for Ukraine)" depending on the officer.
    control: Badge wording is "проверьте" — visible. Owner should monitor
             user telemetry post-deploy and revisit copy if confusion appears.
  - risk: BUG #161, #162 not fixed — users cannot confirm expiration and
          admit-until on review screen even though OCR has them.
    control: Documented as P2 with severity, evidence, and fix scope.
             Out-of-scope for THIS audit per spec hard_rules — recommend
             follow-up.
  - risk: I-94 admission_number marked requires_review (ai_brain). If user
          ignores badge, wrong number could ship.
    control: UI shows yellow "проверьте AI" badge already. Acceptable.

