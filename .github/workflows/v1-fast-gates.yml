name: V1 Fast Gates

# Fast V1 contour: typecheck + V1 contract unit tests + content guard.
# The full production build / full test suite / PII secret gate run in
# "Content & Brand Guards" (guards.yml) on the same PR — not duplicated here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v1-fast-gates:
    name: typecheck + V1 unit + content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm --filter web typecheck
      - name: V1 contract unit tests (staging / OCR cache / budget / evidence)
        run: pnpm --filter web exec vitest run src/lib/v1/__tests__/
      - name: Content & certification guard
        run: pnpm --filter web guard:content
