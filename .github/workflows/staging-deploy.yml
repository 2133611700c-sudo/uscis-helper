name: Staging Deploy (manual)

# Builds + deploys a Vercel PREVIEW deployment wired to the ISOLATED staging Supabase
# (#160). A preview deploy NEVER touches Production (messenginfo.com) or the prod
# Supabase. All secrets stay in GitHub. Inert until dispatched with confirm=DEPLOY.
#
# Required secrets: VERCEL_TOKEN, STAGING_SUPABASE_PROJECT_REF, STAGING_SUPABASE_URL,
#   STAGING_SUPABASE_ANON_KEY, STAGING_SUPABASE_SERVICE_ROLE_KEY.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to build + deploy the staging preview'
        required: true
        default: 'dry-run'

permissions:
  contents: read

env:
  # Non-secret Vercel identifiers for the uscis-helper project.
  VERCEL_ORG_ID: team_qRGWLc9kKWuiKWouVsOeO1P4
  VERCEL_PROJECT_ID: prj_G5Bwd5VMDqEMdbPKLlQW50aF3pQq
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PROD_REF: rtfxrlountkoegsseukx
  STAGING_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
  STAGING_URL: ${{ secrets.STAGING_SUPABASE_URL }}
  STAGING_ANON: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
  STAGING_SR: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
  HEALTH_TOKEN: ${{ secrets.HEALTH_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guards — secrets present, staging != prod, URL matches staging ref
        run: |
          set -euo pipefail
          for v in VERCEL_TOKEN STAGING_REF STAGING_URL STAGING_ANON STAGING_SR; do
            eval "val=\${$v:-}"; [ -n "$val" ] || { echo "::error::secret $v missing"; exit 1; }
          done
          [ "$STAGING_REF" != "$PROD_REF" ] || { echo "::error::staging ref == prod ref"; exit 1; }
          echo "$STAGING_URL" | grep -q "$STAGING_REF" || { echo "::error::STAGING_SUPABASE_URL does not contain the staging ref"; exit 1; }
          if echo "$STAGING_URL" | grep -q "$PROD_REF"; then echo "::error::staging URL contains the prod ref"; exit 1; fi
          echo "guards_ok"

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      # pnpm must be on PATH: `vercel build` invokes the project's package manager
      # (pnpm). No `version:` input — action-setup reads it from package.json's
      # `packageManager` field (pnpm@10.x); specifying both would error.
      - uses: pnpm/action-setup@v6

      - run: npm i -g vercel@latest

      - name: Pull PREVIEW env (never production)
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Inject staging Supabase into the build env (local to this run only)
        run: |
          set -euo pipefail
          F=.vercel/.env.preview.local
          touch "$F"
          grep -vE '^(NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_ANON_KEY|SUPABASE_URL|SUPABASE_SERVICE_ROLE_KEY)=' "$F" > "$F.tmp" || true
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$STAGING_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$STAGING_ANON"
            echo "SUPABASE_URL=$STAGING_URL"
            echo "SUPABASE_SERVICE_ROLE_KEY=$STAGING_SR"
            # HEALTH_TOKEN lets the smoke prove the deployment talks to staging Supabase
            # at runtime via the token-gated /api/health (deep DB check).
            [ -n "${HEALTH_TOKEN:-}" ] && echo "HEALTH_TOKEN=$HEALTH_TOKEN"
          } >> "$F.tmp"
          mv "$F.tmp" "$F"
          # Safety: the pulled/overridden env must NOT contain the prod ref anywhere.
          if grep -q "$PROD_REF" "$F"; then echo "::error::prod ref present in build env — aborting"; exit 1; fi
          echo "staging supabase injected (values hidden); prod ref absent"

      - name: Build (confirm=DEPLOY only)
        if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy PREVIEW (confirm=DEPLOY only)
        if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
        id: deploy
        run: |
          set -euo pipefail
          URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "staging_url=$URL"

      - name: Smoke + runtime staging proof (confirm=DEPLOY only)
        if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
        env:
          UA: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
        run: |
          # NOTE: -u/-o pipefail but NOT -e — the conditionals below intentionally use
          # non-zero exit codes (grep) for control flow.
          set -uo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          echo "deployed: $URL"

          # 1) LIVENESS — /api/healthz (UA-exempt). Must be a PREVIEW deployment.
          ok=no
          for i in $(seq 1 25); do
            code=$(curl -s -A "$UA" -o /tmp/hz -w '%{http_code}' "$URL/api/healthz" || true)
            if [ "$code" = "200" ]; then ok=yes; break; fi
            sleep 6
          done
          if [ "$ok" != "yes" ]; then echo "::error::healthz never returned 200"; cat /tmp/hz 2>/dev/null || true; exit 1; fi
          echo "healthz=$(cat /tmp/hz)"
          if ! grep -q '"status":"ok"' /tmp/hz; then echo "::error::healthz status not ok"; exit 1; fi
          if ! grep -q '"environment":"preview"' /tmp/hz; then echo "::error::not a preview deployment (production must never be the target)"; exit 1; fi

          # 2) RUNTIME DB PROOF — the token-gated deep /api/health connects to the
          #    deployment's CONFIGURED Supabase (the staging one we injected) and reads
          #    its tables. 200 ⇒ the running server talks to staging Postgres at runtime.
          #    (NEXT_PUBLIC_SUPABASE_URL is NOT in client JS — the app has no browser
          #    supabase client — so a client-side ref grep is N/A by design.)
          if [ -z "${HEALTH_TOKEN:-}" ]; then echo "::error::HEALTH_TOKEN secret missing"; exit 1; fi
          hcode=$(curl -s -A "$UA" -H "x-health-token: $HEALTH_TOKEN" -o /tmp/health -w '%{http_code}' "$URL/api/health" || true)
          echo "deep_health_code=$hcode"
          echo "deep_health_body=$(head -c 500 /tmp/health 2>/dev/null)"
          if [ "$hcode" != "200" ]; then echo "::error::deep /api/health != 200 — runtime DB connection to staging NOT proven"; exit 1; fi

          # 3) ISOLATION — proven at build time: the injected build env contained ONLY
          #    the staging Supabase and the Inject step HARD-FAILS if the prod ref
          #    appears anywhere in it. Production messenginfo.com is a separate
          #    deployment and is never targeted by a preview deploy.
          echo "smoke_ok url=$URL (preview ✓ · deep-health 200 ✓ · build-env prod-ref-absent ✓)"
