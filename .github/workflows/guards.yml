name: Content & Brand Guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guards:
    name: Forbidden patterns + typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ───────────────────────────────────────────────────────────────
      # Forbidden-string guards (per CLAUDE.md and execution doc)
      # Each step exits non-zero if its pattern is found in source.
      # faqAnswers.ts is excluded from the risk-language guard — that
      # file holds narrative FAQ text where "риск" appears in normal
      # prose, not as a UI label. Cleanup is tracked separately.
      # ───────────────────────────────────────────────────────────────

      - name: Guard — hardcoded USCIS dollar amounts
        run: |
          set +e
          HITS=$(grep -REn '\$580|\$630|\$1[,]?0[02]0' apps/web/src apps/web/messages 2>/dev/null | grep -v node_modules)
          if [ -n "$HITS" ]; then
            echo "::error::Hardcoded USCIS amount found. Use https://www.uscis.gov/feecalculator link instead."
            echo "$HITS"
            exit 1
          fi
          echo "OK — no hardcoded USCIS amounts."

      - name: Guard — risk language in UI
        run: |
          set +e
          HITS=$(grep -REn "high risk|low risk|medium risk|riskLevel|bg-risk-|risk-high|risk-low|RiskBadge" \
            apps/web/src apps/web/messages 2>/dev/null \
            | grep -v node_modules \
            | grep -v faqAnswers.ts)
          if [ -n "$HITS" ]; then
            echo "::error::Risk language in UI. Move narrative to faqAnswers.ts or rephrase."
            echo "$HITS"
            exit 1
          fi
          echo "OK — no risk language in UI."

      - name: Guard — forbidden brand & marketing strings
        run: |
          set +e
          HITS=$(grep -REn "USCIS Helper|AI-powered|AI-assisted|AI lawyer|Certified Translation|we determine eligibility|we guarantee approval|we file for you" \
            apps/web/src apps/web/messages 2>/dev/null | grep -v node_modules)
          if [ -n "$HITS" ]; then
            echo "::error::Forbidden marketing/brand string."
            echo "$HITS"
            exit 1
          fi
          echo "OK — no forbidden brand strings."

      - name: Guard — stale I-131 edition or wrong item for Ukraine re-parole
        run: |
          set +e
          # VERIFIED FACTS (USCIS Forms Updates page, 2026-05-03):
          # - I-131 current accepted edition: 02/27/26  ← CORRECT, allowed in source
          # - Edition 01/20/25 is NO LONGER accepted since April 1, 2026
          # - Item 10.G = Family Reunification Task Force, NOT Ukrainian re-parole
          # - Ukrainian re-parole correct item = 10.C (verified from I-131 PDF)
          #
          # Block 01/20/25 appearing as the I-131 form edition in user-visible strings.
          # Scope: only I-131 context. I-821/I-765/etc may have different editions.
          # Allow historical references (edition_replaces, "no longer accepted", "old", "stopped", comments).
          HITS_OLD=$(grep -REn "I-131.*01/20/25|01/20/25.*I-131" apps/web/src apps/web/messages 2>/dev/null \
            | grep -v node_modules \
            | grep -Ev "edition_replaces|no.longer|not.accepted|replaced|superseded|legacy|old|stopped|#|//")
          # Block 10.G being incorrectly associated with Ukraine re-parole
          HITS_ITEM=$(grep -REn "10\.G.*[Uu]kraine|10\.G.*re-parole|[Uu]kraine.*10\.G|re-parole.*10\.G" \
            apps/web/src apps/web/messages 2>/dev/null | grep -v node_modules)
          FAIL=0
          if [ -n "$HITS_OLD" ]; then
            echo "::error::Stale I-131 edition 01/20/25 used as current. Correct edition is 02/27/26 (USCIS Forms Updates, since April 1 2026)."
            echo "$HITS_OLD"
            FAIL=1
          fi
          if [ -n "$HITS_ITEM" ]; then
            echo "::error::Item 10.G incorrectly associated with Ukrainian re-parole. Correct item is 10.C."
            echo "$HITS_ITEM"
            FAIL=1
          fi
          [ $FAIL -eq 0 ] && echo "OK — I-131 edition and item references correct."
          exit $FAIL

      - name: Guard — forbidden master email in source
        run: |
          set +e
          # Per CLAUDE.md: master Google account email must never appear in
          # source/comments/tests. Use BACKUP_EMAIL env var for ops mail.
          HITS=$(grep -RnE "2133611700c@gmail" apps/ 2>/dev/null | grep -v node_modules)
          if [ -n "$HITS" ]; then
            echo "::error::Master account email leaked into source. Use env var only."
            echo "$HITS"
            exit 1
          fi
          echo "OK — no master email in source."

      - name: Guard — DeepSeek model names in client UI
        run: |
          set +e
          # DeepSeek allowed in server-side code (app/api/, lib/, packages/).
          # Block only in client-visible locations: messages, [locale] pages, components.
          HITS=$(grep -REn "DeepSeek|deepseek-(chat|reasoner|ocr|v4)" \
            apps/web/messages \
            apps/web/src/components \
            "apps/web/src/app/[locale]" \
            2>/dev/null \
            | grep -v node_modules)
          if [ -n "$HITS" ]; then
            echo "::error::DeepSeek model name in client-visible code. Use 'assistant' in UI."
            echo "$HITS"
            exit 1
          fi
          echo "OK — no DeepSeek leak in client UI."

      # ───────────────────────────────────────────────────────────────
      # Type and build verification
      # ───────────────────────────────────────────────────────────────

      - name: TypeScript check
        run: pnpm --filter web typecheck

      - name: Production build
        run: pnpm --filter web build
