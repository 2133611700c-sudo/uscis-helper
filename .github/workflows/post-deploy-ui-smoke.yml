name: Post-Deploy UI Smoke

# Wizard-level E2E against the live deployment with SYNTHETIC fixtures (no PII).
# Catches wizard-CONFIG bugs the API smoke cannot (autoread flag, label whitelist —
# the 2026-06-11 class). Runs after every successful production deployment.
on:
  deployment_status:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-smoke:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       (github.event.deployment.environment == 'Production' ||
        github.event.deployment.environment == 'production'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Wizard E2E smoke (synthetic fixtures, live prod)
        run: npx playwright test tests/e2e-ui/wizard-smoke.spec.ts
